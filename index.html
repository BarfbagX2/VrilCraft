<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vril Craft</title>
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <style>
        :root {
            --primary-color: #8a2be2;
            --primary-light: #9370db;
            --primary-dark: #4b0082;
            --background-color: #1a1a2e;
            --card-background: #16213e;
            --text-color: #e6e6e6;
            --text-secondary: #a0a0a0;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            --transition: all 0.3s ease;
            --agarthan-gold: #d4af37;
            --agarthan-red: #8b0000;
        }

        .dark-mode {
            --primary-color: #9370db;
            --primary-light: #d8bfd8;
            --primary-dark: #4b0082;
            --background-color: #0a0a1a;
            --card-background: #0d1321;
            --text-color: #f0f0f0;
            --text-secondary: #c0c0c0;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Roboto', sans-serif;
        }

        body {
            background-color: var(--background-color);
            color: var(--text-color);
            transition: var(--transition);
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background-color: rgba(26, 26, 46, 0.8);
            border-radius: 10px;
            box-shadow: var(--shadow);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid var(--text-secondary);
            margin-bottom: 20px;
        }

        .logo {
            font-size: 28px;
            font-weight: 700;
            color: var(--agarthan-gold);
            font-family: 'MedievalSharp', cursive;
            text-shadow: 2px 2px 4px var(--agarthan-red);
        }

        .nav {
            display: flex;
            gap: 20px;
        }

        .nav-link {
            text-decoration: none;
            color: var(--text-color);
            font-weight: 500;
            transition: var(--transition);
            position: relative;
            font-family: 'MedievalSharp', cursive;
        }

        .nav-link:hover {
            color: var(--agarthan-gold);
        }

        .nav-link::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -5px;
            left: 0;
            background-color: var(--agarthan-gold);
            transition: var(--transition);
        }

        .nav-link:hover::after {
            width: 100%;
        }

        .search-container {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

        .search-input {
            width: 100%;
            max-width: 600px;
            padding: 10px 20px;
            border: 1px solid var(--text-secondary);
            border-radius: 25px;
            background-color: var(--card-background);
            color: var(--text-color);
            font-size: 16px;
            transition: var(--transition);
            border: 2px solid var(--agarthan-gold);
            font-family: 'MedievalSharp', cursive;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--agarthan-gold);
            box-shadow: 0 0 0 2px rgba(138, 43, 226, 0.2);
        }

        .toggle-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .toggle-label {
            font-size: 14px;
            font-weight: 500;
            font-family: 'MedievalSharp', cursive;
        }

        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: var(--transition);
            border-radius: 24px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: var(--transition);
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: var(--agarthan-gold);
        }

        input:checked + .slider:before {
            transform: translateX(26px);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background-color: var(--card-background);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: var(--transition);
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.5s ease forwards;
            border: 2px solid var(--agarthan-gold);
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4);
            border-color: var(--agarthan-red);
        }

        .card-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-bottom: 2px solid var(--agarthan-gold);
        }

        .card-content {
            padding: 20px;
        }

        .card-title {
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 10px;
            color: var(--agarthan-gold);
            text-shadow: 1px 1px 2px var(--agarthan-red);
            font-family: 'MedievalSharp', cursive;
        }

        .card-desc {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 20px;
            font-family: 'Roboto', sans-serif;
        }

        .card-btn {
            display: inline-block;
            padding: 10px 20px;
            background-color: var(--agarthan-gold);
            color: var(--primary-dark);
            text-decoration: none;
            border-radius: 4px;
            font-weight: 500;
            transition: var(--transition);
            border: 2px solid var(--primary-dark);
            font-family: 'MedievalSharp', cursive;
        }

        .card-btn:hover {
            background-color: var(--agarthan-red);
            color: white;
            border-color: white;
        }

        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background-color: var(--background-color);
            z-index: 1000;
        }

        .loading-gif {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(138, 43, 226, 0.2);
            border-top-color: var(--agarthan-gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        #particles-js {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }
    </style>
</head>
<body>
    <div class="loading" id="loading">
        <img src="https://image2url.com/r2/default/gifs/1773771914482-2784bcdf-f8ab-4673-9d9e-a052ca36e448.gif" alt="Loading" class="loading-gif">
    </div>

    <div id="particles-js"></div>

    <div class="container">
        <header>
            <div class="logo">Vril Craft</div>
            <nav class="nav">
                <a href="#" class="nav-link">Home</a>
                <a href="#" class="nav-link">About</a>
                <a href="https://barfbagx2.github.io/TheGoonLagoonV67/" class="nav-link" target="_blank">Contact</a>
                <div class="toggle-container">
                    <span class="toggle-label">Dark Mode</span>
                    <label class="toggle-switch">
                        <input type="checkbox" id="darkModeToggle">
                        <span class="slider"></span>
                    </label>
                </div>
            </nav>
        </header>

        <div class="search-container">
            <input type="text" class="search-input" id="searchInput" placeholder="Search links...">
        </div>

        <div class="grid" id="linkGrid">
            <!-- Cards will be dynamically added here -->
        </div>
    </div>

    <script>
        // Sample data for links
        const links = [
            {
                title: "Agartha Portal",
                description: "Gateway to the hidden realms of Agartha.",
                url: "https://www.agartha-portal.com",
                img: "https://images.unsplash.com/photo-1506748686214-e9df14d4d9d0?ixlib=rb-1.2.1&auto=format&fit=crop&w=500&q=60"
            },
            {
                title: "Vril Technology",
                description: "Explore the mysteries of Vril technology.",
                url: "https://www.vril-tech.com",
                img: "https://images.unsplash.com/photo-1517147177326-b37599372b73?ixlib=rb-1.2.1&auto=format&fit=crop&w=500&q=60"
            },
            {
                title: "Ancient Civilizations",
                description: "Discover the secrets of ancient civilizations.",
                url: "https://www.ancient-civilizations.com",
                img: "https://images.unsplash.com/photo-1518791841217-8f162f1e1131?ixlib=rb-1.2.1&auto=format&fit=crop&w=500&q=60"
            },
            {
                title: "Esoteric Knowledge",
                description: "Unlock the esoteric knowledge of the past.",
                url: "https://www.esoteric-knowledge.com",
                img: "https://images.unsplash.com/photo-1507842217343-583bb7270b66?ixlib=rb-1.2.1&auto=format&fit=crop&w=500&q=60"
            },
            {
                title: "Hidden Realms",
                description: "Journey through the hidden realms of the Earth.",
                url: "https://www.hidden-realms.com",
                img: "https://images.unsplash.com/photo-1501785888041-af3ef285b470?ixlib=rb-1.2.1&auto=format&fit=crop&w=500&q=60"
            },
            {
                title: "Forbidden Archeology",
                description: "Explore the forbidden archeological sites.",
                url: "https://www.forbidden-archeology.com",
                img: "https://images.unsplash.com/photo-1511632765486-a01980e01a18?ixlib=rb-1.2.1&auto=format&fit=crop&w=500&q=60"
            },
            {
                title: "Lost Technologies",
                description: "Discover the lost technologies of the past.",
                url: "https://www.lost-technologies.com",
                img: "https://images.unsplash.com/photo-1519163114102-42a6e82680a2?ixlib=rb-1.2.1&auto=format&fit=crop&w=500&q=60"
            },
            {
                title: "Ancient Symbols",
                description: "Unravel the mysteries of ancient symbols.",
                url: "https://www.ancient-symbols.com",
                img: "https://images.unsplash.com/photo-1507838153414-417bb95756f9?ixlib=rb-1.2.1&auto=format&fit=crop&w=500&q=60"
            },
            {
                title: "Hidden Knowledge",
                description: "Access the hidden knowledge of the ancients.",
                url: "https://www.hidden-knowledge.com",
                img: "https://images.unsplash.com/photo-1507842217343-583bb7270b66?ixlib=rb-1.2.1&auto=format&fit=crop&w=500&q=60"
            },
            {
                title: "Esoteric Wisdom",
                description: "Gain esoteric wisdom from the past.",
                url: "https://www.esoteric-wisdom.com",
                img: "https://images.unsplash.com/photo-1511632765486-a01980e01a18?ixlib=rb-1.2.1&auto=format&fit=crop&w=500&q=60"
            },
            {
                title: "Ancient Mysteries",
                description: "Solve the ancient mysteries of the world.",
                url: "https://www.ancient-mysteries.com",
                img: "https://images.unsplash.com/photo-1519163114102-42a6e82680a2?ixlib=rb-1.2.1&auto=format&fit=crop&w=500&q=60"
            },
            {
                title: "Hidden Treasures",
                description: "Find the hidden treasures of the Earth.",
                url: "https://www.hidden-treasures.com",
                img: "https://images.unsplash.com/photo-1507838153414-417bb95756f9?ixlib=rb-1.2.1&auto=format&fit=crop&w=500&q=60"
            }
        ];

        // Function to create a card element
        function createCard(link) {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <img src="${link.img}" alt="${link.title}" class="card-img">
                <div class="card-content">
                    <h3 class="card-title">${link.title}</h3>
                    <p class="card-desc">${link.description}</p>
                    <a href="${link.url}" class="card-btn" target="_blank">Explore</a>
                </div>
            `;
            return card;
        }

        // Function to render cards
        function renderCards(filteredLinks) {
            const grid = document.getElementById('linkGrid');
            grid.innerHTML = '';
            filteredLinks.forEach(link => {
                const card = createCard(link);
                grid.appendChild(card);
            });
        }

        // Function to filter links based on search input
        function filterLinks() {
            const searchInput = document.getElementById('searchInput').value.toLowerCase();
            const filteredLinks = links.filter(link =>
                link.title.toLowerCase().includes(searchInput) ||
                link.description.toLowerCase().includes(searchInput)
            );
            renderCards(filteredLinks);
        }

        // Function to toggle dark mode
        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            const isDarkMode = document.body.classList.contains('dark-mode');
            localStorage.setItem('darkMode', isDarkMode);
        }

        // Initialize the page
        function init() {
            // Check for dark mode preference in local storage
            const darkMode = localStorage.getItem('darkMode');
            if (darkMode === 'true') {
                document.body.classList.add('dark-mode');
                document.getElementById('darkModeToggle').checked = true;
            }

            // Render all cards initially
            renderCards(links);

            // Add event listener for search input
            document.getElementById('searchInput').addEventListener('input', filterLinks);

            // Add event listener for dark mode toggle
            document.getElementById('darkModeToggle').addEventListener('change', toggleDarkMode);

            // Initialize particles.js
            particlesJS('particles-js', {
                particles: {
                    number: {
                        value: 80,
                        density: {
                            enable: true,
                            value_area: 800
                        }
                    },
                    color: {
                        value: '#8a2be2'
                    },
                    shape: {
                        type: 'circle',
                        stroke: {
                            width: 0,
                            color: '#000000'
                        }
                    },
                    opacity: {
                        value: 0.5,
                        random: true,
                        anim: {
                            enable: true,
                            speed: 1,
                            opacity_min: 0.1,
                            sync: false
                        }
                    },
                    size: {
                        value: 3,
                        random: true,
                        anim: {
                            enable: true,
                            speed: 2,
                            size_min: 0.1,
                            sync: false
                        }
                    },
                    line_linked: {
                        enable: true,
                        distance: 150,
                        color: '#8a2be2',
                        opacity: 0.4,
                        width: 1
                    },
                    move: {
                        enable: true,
                        speed: 1,
                        direction: 'none',
                        random: true,
                        straight: false,
                        out_mode: 'out',
                        bounce: false,
                        attract: {
                            enable: false,
                            rotateX: 600,
                            rotateY: 1200
                        }
                    }
                },
                interactivity: {
                    detect_on: 'canvas',
                    events: {
                        onhover: {
                            enable: true,
                            mode: 'grab'
                        },
                        onclick: {
                            enable: true,
                            mode: 'push'
                        },
                        resize: true
                    },
                    modes: {
                        grab: {
                            distance: 140,
                            line_linked: {
                                opacity: 1
                            }
                        },
                        push: {
                            particles_nb: 4
                        }
                    }
                },
                retina_detect: true
            });

            // Hide loading animation after a short delay
            setTimeout(() => {
                document.getElementById('loading').style.display = 'none';
            }, 3000);
        }

        // Call init function when the page loads
        window.addEventListener('load', init);
    </script>
</body>
</html>
