<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TGL's Vril Craft</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <style>
        :root {
            --primary-color: #6200ee;
            --primary-light: #9e47ff;
            --primary-dark: #3700b3;
            --background-color: #f5f5f5;
            --card-background: #ffffff;
            --text-color: #333333;
            --text-secondary: #666666;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            --transition: all 0.3s ease;
        }

        .dark-mode {
            --primary-color: #bb86fc;
            --primary-light: #eaddff;
            --primary-dark: #3700b3;
            --background-color: #121212;
            --card-background: #1e1e1e;
            --text-color: #ffffff;
            --text-secondary: #aaaaaa;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Roboto', sans-serif;
        }

        body {
            background-color: var(--background-color);
            color: var(--text-color);
            transition: var(--transition);
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid var(--text-secondary);
            margin-bottom: 20px;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary-color);
        }

        .nav {
            display: flex;
            gap: 20px;
        }

        .nav-link {
            text-decoration: none;
            color: var(--text-color);
            font-weight: 500;
            transition: var(--transition);
        }

        .nav-link:hover {
            color: var(--primary-color);
        }

        .search-container {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

        .search-input {
            width: 100%;
            max-width: 600px;
            padding: 10px 20px;
            border: 1px solid var(--text-secondary);
            border-radius: 25px;
            background-color: var(--card-background);
            color: var(--text-color);
            font-size: 16px;
            transition: var(--transition);
        }

        .search-input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px rgba(98, 0, 238, 0.2);
        }

        .toggle-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .toggle-label {
            font-size: 14px;
            font-weight: 500;
        }

        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: var(--transition);
            border-radius: 24px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: var(--transition);
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: var(--primary-color);
        }

        input:checked + .slider:before {
            transform: translateX(26px);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background-color: var(--card-background);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: var(--transition);
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.5s ease forwards;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .card-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }

        .card-content {
            padding: 20px;
        }

        .card-title {
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 10px;
            color: var(--text-color);
        }

        .card-desc {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 20px;
        }

        .card-btn {
            display: inline-block;
            padding: 10px 20px;
            background-color: var(--primary-color);
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-weight: 500;
            transition: var(--transition);
        }

        .card-btn:hover {
            background-color: var(--primary-dark);
        }

        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background-color: var(--background-color);
            z-index: 1000;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(98, 0, 238, 0.2);
            border-top-color: var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        #particles-js {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }
    </style>
</head>
<body>
    <div class="loading" id="loading">
        <div class="spinner"></div>
    </div>

    <div id="particles-js"></div>

    <div class="container">
        <header>
            <div class="logo">Link Collection</div>
            <nav class="nav">
                <a href="#" class="nav-link">Home</a>
                <a href="#" class="nav-link">About</a>
                <a href="#" class="nav-link">Contact</a>
                <div class="toggle-container">
                    <span class="toggle-label">Dark Mode</span>
                    <label class="toggle-switch">
                        <input type="checkbox" id="darkModeToggle">
                        <span class="slider"></span>
                    </label>
                </div>
            </nav>
        </header>

        <div class="search-container">
            <input type="text" class="search-input" id="searchInput" placeholder="Search links...">
        </div>

        <div class="grid" id="linkGrid">
            <!-- Cards will be dynamically added here -->
        </div>
    </div>

    <script>
        // Sample data for links
        const links = [
            {
                title: "Google",
                description: "Search engine and online productivity suite.",
                url: "https://www.google.com",
                img: "https://via.placeholder.com/300x180?text=Google"
            },
            {
                title: "GitHub",
                description: "Platform for version control and collaboration.",
                url: "https://www.github.com",
                img: "https://via.placeholder.com/300x180?text=GitHub"
            },
            {
                title: "Stack Overflow",
                description: "Q&A site for programmers.",
                url: "https://stackoverflow.com",
                img: "https://via.placeholder.com/300x180?text=Stack+Overflow"
            },
            {
                title: "MDN Web Docs",
                description: "Comprehensive resource for web developers.",
                url: "https://developer.mozilla.org",
                img: "https://via.placeholder.com/300x180?text=MDN+Web+Docs"
            },
            {
                title: "YouTube",
                description: "Video sharing platform.",
                url: "https://www.youtube.com",
                img: "https://via.placeholder.com/300x180?text=YouTube"
            },
            {
                title: "Wikipedia",
                description: "Free online encyclopedia.",
                url: "https://www.wikipedia.org",
                img: "https://via.placeholder.com/300x180?text=Wikipedia"
            },
            {
                title: "Twitter",
                description: "Social media platform.",
                url: "https://www.twitter.com",
                img: "https://via.placeholder.com/300x180?text=Twitter"
            },
            {
                title: "Reddit",
                description: "Social news aggregation and discussion website.",
                url: "https://www.reddit.com",
                img: "https://via.placeholder.com/300x180?text=Reddit"
            },
            {
                title: "LinkedIn",
                description: "Business and employment-oriented social media platform.",
                url: "https://www.linkedin.com",
                img: "https://via.placeholder.com/300x180?text=LinkedIn"
            },
            {
                title: "Medium",
                description: "Online publishing platform.",
                url: "https://www.medium.com",
                img: "https://via.placeholder.com/300x180?text=Medium"
            },
            {
                title: "Amazon",
                description: "E-commerce platform.",
                url: "https://www.amazon.com",
                img: "https://via.placeholder.com/300x180?text=Amazon"
            },
            {
                title: "Netflix",
                description: "Streaming service.",
                url: "https://www.netflix.com",
                img: "https://via.placeholder.com/300x180?text=Netflix"
            }
        ];

        // Function to create a card element
        function createCard(link) {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <img src="${link.img}" alt="${link.title}" class="card-img">
                <div class="card-content">
                    <h3 class="card-title">${link.title}</h3>
                    <p class="card-desc">${link.description}</p>
                    <a href="${link.url}" class="card-btn" target="_blank">Visit</a>
                </div>
            `;
            return card;
        }

        // Function to render cards
        function renderCards(filteredLinks) {
            const grid = document.getElementById('linkGrid');
            grid.innerHTML = '';
            filteredLinks.forEach(link => {
                const card = createCard(link);
                grid.appendChild(card);
            });
        }

        // Function to filter links based on search input
        function filterLinks() {
            const searchInput = document.getElementById('searchInput').value.toLowerCase();
            const filteredLinks = links.filter(link =>
                link.title.toLowerCase().includes(searchInput) ||
                link.description.toLowerCase().includes(searchInput)
            );
            renderCards(filteredLinks);
        }

        // Function to toggle dark mode
        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            const isDarkMode = document.body.classList.contains('dark-mode');
            localStorage.setItem('darkMode', isDarkMode);
        }

        // Initialize the page
        function init() {
            // Check for dark mode preference in local storage
            const darkMode = localStorage.getItem('darkMode');
            if (darkMode === 'true') {
                document.body.classList.add('dark-mode');
                document.getElementById('darkModeToggle').checked = true;
            }

            // Render all cards initially
            renderCards(links);

            // Add event listener for search input
            document.getElementById('searchInput').addEventListener('input', filterLinks);

            // Add event listener for dark mode toggle
            document.getElementById('darkModeToggle').addEventListener('change', toggleDarkMode);

            // Initialize particles.js
            particlesJS('particles-js', {
                particles: {
                    number: {
                        value: 80,
                        density: {
                            enable: true,
                            value_area: 800
                        }
                    },
                    color: {
                        value: '#6200ee'
                    },
                    shape: {
                        type: 'circle',
                        stroke: {
                            width: 0,
                            color: '#000000'
                        }
                    },
                    opacity: {
                        value: 0.5,
                        random: true,
                        anim: {
                            enable: true,
                            speed: 1,
                            opacity_min: 0.1,
                            sync: false
                        }
                    },
                    size: {
                        value: 3,
                        random: true,
                        anim: {
                            enable: true,
                            speed: 2,
                            size_min: 0.1,
                            sync: false
                        }
                    },
                    line_linked: {
                        enable: true,
                        distance: 150,
                        color: '#6200ee',
                        opacity: 0.4,
                        width: 1
                    },
                    move: {
                        enable: true,
                        speed: 1,
                        direction: 'none',
                        random: true,
                        straight: false,
                        out_mode: 'out',
                        bounce: false,
                        attract: {
                            enable: false,
                            rotateX: 600,
                            rotateY: 1200
                        }
                    }
                },
                interactivity: {
                    detect_on: 'canvas',
                    events: {
                        onhover: {
                            enable: true,
                            mode: 'grab'
                        },
                        onclick: {
                            enable: true,
                            mode: 'push'
                        },
                        resize: true
                    },
                    modes: {
                        grab: {
                            distance: 140,
                            line_linked: {
                                opacity: 1
                            }
                        },
                        push: {
                            particles_nb: 4
                        }
                    }
                },
                retina_detect: true
            });

            // Hide loading animation after a short delay
            setTimeout(() => {
                document.getElementById('loading').style.display = 'none';
            }, 1000);
        }

        // Call init function when the page loads
        window.addEventListener('load', init);
    </script>
</body>
</html>
